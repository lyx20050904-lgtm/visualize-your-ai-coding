<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Guarding</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<link rel="stylesheet" href="/agent-styles.css">
</head>
<body>

<!-- ── Top Bar ── -->
<header id="topbar">
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="2.5" fill="currentColor"/>
      <circle cx="3"  cy="5"  r="1.8" fill="currentColor" opacity=".6"/>
      <circle cx="17" cy="5"  r="1.8" fill="currentColor" opacity=".6"/>
      <circle cx="3"  cy="15" r="1.8" fill="currentColor" opacity=".6"/>
      <circle cx="17" cy="15" r="1.8" fill="currentColor" opacity=".6"/>
      <line x1="10" y1="10" x2="3"  y2="5"  stroke="currentColor" stroke-width="1" opacity=".4"/>
      <line x1="10" y1="10" x2="17" y2="5"  stroke="currentColor" stroke-width="1" opacity=".4"/>
      <line x1="10" y1="10" x2="3"  y2="15" stroke="currentColor" stroke-width="1" opacity=".4"/>
      <line x1="10" y1="10" x2="17" y2="15" stroke="currentColor" stroke-width="1" opacity=".4"/>
    </svg>
    <span class="logo-text">Vibe Guarding</span>
  </div>

  <div class="project-input-wrap" id="projectInputWrap">
    <input type="text" id="projectPathInput" placeholder="Paste project path and press Enter…" autocomplete="off">
  </div>

  <div class="topbar-actions">
    <!-- View toggle -->
    <div class="view-toggle" id="viewToggle" title="Switch view">
      <button class="view-btn active" data-view="dev" title="Developer view — all files">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
        </svg>
      </button>
      <button class="view-btn" data-view="simple" title="Simple view — business files only">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <!-- Connection status -->
    <div class="status-pill" id="statusPill">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">disconnected</span>
    </div>
  </div>
</header>

<!-- ── Main Layout ── -->
<div id="layout">

  <!-- Left: File Tree -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Files</span>
      <input type="text" id="treeFilter" placeholder="Filter…" class="filter-input">
    </div>
    <div id="treeContainer" class="tree-container"></div>
  </aside>

  <!-- Center: Graph -->
  <main id="canvas">
    <div id="graphContainer">
      <svg id="graphSvg"></svg>
      <div id="tooltip" class="tooltip hidden"></div>
    </div>

    <!-- Empty state -->
    <div id="emptyState" class="empty-state">
      <div class="empty-icon">
        <svg viewBox="0 0 80 80" fill="none">
          <circle cx="40" cy="40" r="22" stroke="currentColor" stroke-width="1.5" opacity=".15"/>
          <circle cx="40" cy="18" r="5" stroke="currentColor" stroke-width="1.5" opacity=".5"/>
          <circle cx="62" cy="52" r="5" stroke="currentColor" stroke-width="1.5" opacity=".5"/>
          <circle cx="18" cy="52" r="5" stroke="currentColor" stroke-width="1.5" opacity=".5"/>
          <line x1="40" y1="23" x2="40" y2="18" stroke="currentColor" stroke-width="1" opacity=".3"/>
          <line x1="57" y1="49" x2="62" y2="47" stroke="currentColor" stroke-width="1" opacity=".3"/>
          <line x1="23" y1="49" x2="18" y2="47" stroke="currentColor" stroke-width="1" opacity=".3"/>
        </svg>
      </div>
      <h2>Open a project to start monitoring</h2>
      <p>Paste the absolute path to your project directory in the top bar and press Enter.</p>
      <div class="empty-hint">
        <code>/Users/you/my-project</code>
      </div>
    </div>
  </main>

  <!-- Right: Details Panel -->
  <aside id="details">
    <div class="details-header">
      <span class="details-title">Details</span>
      <div class="llm-status" id="llmStatus" style="display:none">
        <span class="llm-dot" id="llmDot"></span>
        <span id="llmStatusText">AI descriptions loading…</span>
      </div>
    </div>
    <div id="detailsContent" class="details-content">
      <div class="details-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="32" height="32" opacity=".3">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p>Click any node to inspect</p>
      </div>
    </div>
  </aside>

</div>

<!-- ── Activity Log ── -->
<footer id="logbar">
  <div class="log-header">
    <div class="log-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Activity
    </div>
    <div class="log-actions">
      <button id="btnClearLog" class="btn-tiny">Clear</button>
      <button id="btnToggleLog" class="btn-tiny">Hide</button>
    </div>
  </div>
  <div id="logContainer" class="log-container"></div>
</footer>

<script src="/app-log.js"></script>
<script src="/app.js"></script>
<script src="/visualizer.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => new App());</script>
</body>
</html>
